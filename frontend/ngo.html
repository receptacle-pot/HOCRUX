<!DOCTYPE html>
<html>
<head>
  <title>NGO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Available Food</h2>
  <div id="list"></div>
</div>

<script src="script.js"></script>
<script>
function loadFood() {
  let data = getFood();
  let html = "";

  data.forEach(f => {
    if(f.status === "available") {
      html += `
        <div class="card">
          <h3>${f.title}</h3>
          <p>${f.quantity}</p>
          <p>${f.location}</p>
          <button onclick="claim(${f.id})">Claim</button>
        </div>
      `;
    }
  });

  document.getElementById("list").innerHTML = html;
}

function claim(id) {
  claimFood(id);
  alert("Claimed!");
  loadFood();
}

loadFood();
</script>

</body>
</html>
