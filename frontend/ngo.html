<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunger Bridge — NGO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particles"></canvas>

<div id="header-mount"></div>

<div class="app-body" id="page-body"></div>

<div id="toast-container"></div>

<script src="script.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = renderHeader('🏛️ NGO', 'ngo');

  let filterStatus = 'all';

  function renderPage() {
    const foods     = getFoods();
    const available = foods.filter(f => f.status === 'available');
    const urgent    = available.filter(f => getExpiryInfo(f.expiry).hours < 1);
    const sorted    = [...available].sort((a, b) => {
      const priorityMap = { high: 0, medium: 1, low: 2 };
      const ap = priorityMap[a.priority] ?? 2;
      const bp = priorityMap[b.priority] ?? 2;
      const ae = getExpiryInfo(a.expiry).hours;
      const be = getExpiryInfo(b.expiry).hours;
      return (ap - bp) || (ae - be);
    });

    const urgencyBanner = urgent.length > 0
      ? `<div class="urgency-section">
           <div class="urgency-icon">🚨</div>
           <div class="urgency-text">
             <h4>${urgent.length} listing${urgent.length > 1 ? 's' : ''} expiring in under 60 minutes</h4>
             <p>Claim immediately to prevent food waste — these are prioritised by AI matching.</p>
           </div>
         </div>` : '';

    document.getElementById('page-body').innerHTML = `
      <div class="stats-row">
        <div class="stat-card green">
          <div class="stat-card-num">${available.length}</div>
          <div class="stat-card-label">Available Now</div>
        </div>
        <div class="stat-card red">
          <div class="stat-card-num">${urgent.length}</div>
          <div class="stat-card-label">Expiring Soon</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-card-num">${foods.filter(f => f.status === 'claimed').length}</div>
          <div class="stat-card-label">Claimed Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" style="color:var(--text)">3</div>
          <div class="stat-card-label">NGOs Connected</div>
        </div>
      </div>

      ${renderMap()}
      ${urgencyBanner}

      <div class="ai-section">
        <div class="ai-section-header"><div class="ai-pulse"></div> AI Redistribution Insights</div>
        <div id="ai-insights"><span class="typing-cursor"></span></div>
      </div>

      <div class="section-title">Available Food <span class="count-badge">${available.length}</span></div>
      <div class="filter-bar">
        <button class="filter-chip ${filterStatus==='all'    ?'active':''}" onclick="setFilter('all')">All</button>
        <button class="filter-chip ${filterStatus==='urgent' ?'active':''}" onclick="setFilter('urgent')">⚡ Urgent</button>
        <button class="filter-chip ${filterStatus==='high'   ?'active':''}" onclick="setFilter('high')">High Priority</button>
        <div class="filter-spacer"></div>
        <select class="sort-select" onchange="resortNGO(this.value)">
          <option value="priority">Sort: Priority</option>
          <option value="expiry">Sort: Expiry</option>
        </select>
      </div>
      <div class="food-grid" id="food-list">
        ${sorted.map(f => renderFoodCard(f, 'ngo')).join('')}
        ${sorted.length === 0 ? '<div class="empty-state"><p>No available food listings right now.<br>Check back soon!</p></div>' : ''}
      </div>`;

    setTimeout(typeAIInsights, 400);
  }

  function typeAIInsights() {
    const foods     = getFoods();
    const available = foods.filter(f => f.status === 'available');
    const urgent    = available.filter(f => getExpiryInfo(f.expiry).hours < 1);
    const highPrio  = available.filter(f => f.priority === 'high');
    const insights  = [
      urgent.length > 0
        ? `${urgent.length} listing${urgent.length > 1 ? 's are' : ' is'} expiring within 60 minutes — immediate claim prevents total waste.`
        : 'No critical expiries in the next hour. Good redistribution window.',
      highPrio.length > 0
        ? `AI match found: "${highPrio[0].title}" at ${highPrio[0].location} has highest community impact score — prioritise claiming this.`
        : 'All current listings are medium to low priority.',
      `Nearest available food to your registered location is ${available[0]?.title || 'N/A'} — estimated 8 min pickup time.`,
      `Today's redistribution efficiency: 72% — ${foods.filter(f => f.status === 'delivered').length} deliveries completed vs. ${available.length} still available.`,
    ];
    const el = document.getElementById('ai-insights');
    if (!el) return;
    el.innerHTML = '';
    insights.forEach((text, i) => {
      const div = document.createElement('div');
      div.className = 'ai-insight-item';
      div.innerHTML = `<span class="ai-insight-num">#${i + 1}</span><span>${text}</span>`;
      div.style.opacity = '0';
      el.appendChild(div);
      setTimeout(() => { div.style.transition = 'opacity 0.4s'; div.style.opacity = '1'; }, i * 300 + 200);
    });
  }

  function setFilter(status) {
    filterStatus = status;
    const foods    = getFoods().filter(f => f.status === 'available');
    let filtered   = foods;
    if (status === 'urgent') filtered = foods.filter(f => getExpiryInfo(f.expiry).hours < 1);
    if (status === 'high')   filtered = foods.filter(f => f.priority === 'high');
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    const list = document.getElementById('food-list');
    if (list) list.innerHTML = filtered.map(f => renderFoodCard(f, 'ngo')).join('')
      || '<div class="empty-state"><p>No listings match this filter.</p></div>';
  }

  function resortNGO(sortBy) {
    const foods  = getFoods().filter(f => f.status === 'available');
    const sorted = sortBy === 'expiry'
      ? [...foods].sort((a, b) => a.expiry - b.expiry)
      : [...foods].sort((a, b) => { const m = { high:0, medium:1, low:2 }; return (m[a.priority]||2) - (m[b.priority]||2); });
    const list = document.getElementById('food-list');
    if (list) list.innerHTML = sorted.map(f => renderFoodCard(f, 'ngo')).join('');
  }

  renderPage();
</script>
</body>
</html>
