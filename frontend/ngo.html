<!DOCTYPE html>
<html>
<head>
  <title>NGO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Available Food</h2>
  <div id="list"></div>
</div>

<script>
function loadFood() {
  fetch("http://127.0.0.1:5000/food")
    .then(res => res.json())
    .then(data => {
      let html = "";
      data.forEach(f => {
        if(f.status === "available") {
          html += `
            <div class="card">
                <h3>${f.title}</h3>
                <p> ${f.quantity}</p>
                <p> ${f.location}</p>
                <span class="badge available">Available</span>
                <button onclick="claim(${f.id})"> Claim</button>
            </div>
        `;
        }
      });
      document.getElementById("list").innerHTML = html;
    });
}

function claim(id) {
  fetch("http://127.0.0.1:5000/claim/" + id, {method:"POST"})
    .then(() => {
      alert("Claimed!");
      loadFood();
    });
}

loadFood();
</script>

</body>
</html>
