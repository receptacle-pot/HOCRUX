<!DOCTYPE html>
<html>
<head>
  <title>Donor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🍛 Post Food</h2>

  <input id="title" placeholder="Food Name">
  <input id="quantity" placeholder="Quantity">
  <input id="location" placeholder="Location">

  <p>Quality:</p>
  <label><input type="radio" name="quality" value="Good" checked> Good</label><br>
  <label><input type="radio" name="quality" value="Better"> Better</label><br>
  <label><input type="radio" name="quality" value="Best"> Best</label><br>
  <label><input type="radio" name="quality" value="Excellent"> Excellent</label>

  <button onclick="postFood()">Post</button>
</div>

<script>
function postFood() {
  let quality = document.querySelector('input[name="quality"]:checked').value;

  fetch("http://127.0.0.1:5000/food", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      title: document.getElementById("title").value,
      quantity: document.getElementById("quantity").value,
      location: document.getElementById("location").value,
      quality: quality
    })
  }).then(() => alert("Posted"));
}
</script>

</body>
</html>
