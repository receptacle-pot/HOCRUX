<!DOCTYPE html>
<html>
<head>
  <title>HungerBridge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1> Hunger Bridge</h1>
  <p>Saving food. Saving lives.</p>

  <div class="card">
    <h3> Impact</h3>
    <p id="total"></p>
    <p id="delivered"></p>
  </div>

  <select id="role">
    <option value="donor"> Donor</option>
    <option value="ngo"> NGO</option>
    <option value="volunteer"> Volunteer</option>
  </select>

  <button onclick="go()">Enter</button>
</div>

<script>
function go() {
  let role = document.getElementById("role").value;
  location.href = role + ".html";
}

fetch("http://127.0.0.1:5000/food")
  .then(res => res.json())
  .then(data => {
    document.getElementById("total").innerText =
      "Total Food Posts: " + data.length;

    let delivered = data.filter(f => f.status === "delivered").length;

    document.getElementById("delivered").innerText =
      "Meals Delivered: " + delivered;
  });
</script>

</body>
</html>
