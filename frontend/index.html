<!DOCTYPE html>
<html>
<head>
  <title>HungerBridge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🍛 HungerBridge</h2>
  <p>Connecting surplus food to those in need</p>

  <select id="role">
    <option value="donor">🍛 Donor</option>
    <option value="ngo">🤝 NGO</option>
    <option value="volunteer">🚚 Volunteer</option>
  </select>

  <button onclick="go()">Enter</button>
</div>

<script>
function go() {
  let role = document.getElementById("role").value;

  if(role === "donor") location.href = "donor.html";
  if(role === "ngo") location.href = "ngo.html";
  if(role === "volunteer") location.href = "volunteer.html";
}
</script>

</body>
</html>
