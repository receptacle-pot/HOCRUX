<!DOCTYPE html>
<html>
<head>
  <title>Volunteer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Delivery Tasks</h2>
  <div id="tasks"></div>
</div>

<script src="script.js"></script>
<script>
function loadTasks() {
  let data = getFood();
  let html = "";

  data.forEach(f => {
    if(f.status === "claimed") {
      html += `
        <div class="card">
          <h3>${f.title}</h3>
          <p>${f.location}</p>
          <button onclick="deliver(${f.id})">Deliver</button>
        </div>
      `;
    }
  });

  document.getElementById("tasks").innerHTML = html;
}

function deliver(id) {
  deliverFood(id);
  alert("Delivered!");
  loadTasks();
}

loadTasks();
</script>

</body>
</html>
